; =============================================================================
; BlueSlaveP4 — PlatformIO Configuration
; Guition ESP32-P4 JC1060P470C (7" MIPI-DSI, 16MB Flash, 32MB PSRAM)
; RED808 V6 — Visual Beast (HMI Display)
; =============================================================================
;
; NOTE: ESP32-P4 support in pioarduino/Arduino-ESP32 is still maturing.
;       If Arduino framework fails, switch to framework = espidf.
;       The code uses ESP-IDF APIs (esp_lcd, freertos) that work in both.
;
; BOARD: Guition JC1060P470C
;   Display: 1024×600 MIPI-DSI 2-lane (JD9165BA)
;   Touch:   GT911 I2C (0x5D)
;   WiFi:    ESP32-C6 companion (not used — S3 handles UDP)
;   PSRAM:   32MB OPI
;   Flash:   16MB QIO

[env:esp32p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = guition_esp32p4_7
framework = arduino
build_src_filter = +<*>
build_flags = 
	-O2
	-DCORE_DEBUG_LEVEL=0
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-DLV_MEM_CUSTOM=1
	-DLV_MEMCPY_MEMSET_STD=1
	-I include
	-I src/drivers
	-I src/ui
	; Guition JC1060P470C pin definitions
	-DLCD_H_RES=1024
	-DLCD_V_RES=600
	-DMIPI_DSI_LANES=2
	-DMIPI_DSI_LANE_BITRATE_MBPS=550
	-DLCD_BL_GPIO=23
	-DLCD_RST_GPIO=27
	-DTOUCH_RST_GPIO=22
	-DTOUCH_INT_GPIO=21
	-DTOUCH_I2C_SDA=7
	-DTOUCH_I2C_SCL=8
	-DTOUCH_I2C_ADDR=0x5D
	; UART to S3
	-DUART_S3_TX_PIN=24
	-DUART_S3_RX_PIN=25
lib_deps = 
	lvgl/lvgl@^8.4.0
upload_port = COM21
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
