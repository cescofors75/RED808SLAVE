; =============================================================================
; BlueSlaveV2 - RED808 V6 Surface Controller
; Waveshare ESP32-S3-Touch-LCD-7B (1024x600, GT911 Touch)
; PlatformIO Configuration
; =============================================================================

[env:test_minimal]
platform = espressif32@6.12.0
board = waveshare_s3_lcd7
framework = arduino
build_flags = -DMINIMAL_TEST
upload_port = COM19
upload_speed = 460800
monitor_speed = 115200
monitor_port = COM19
build_src_filter = +<main_test.cpp> -<main.cpp> -<drivers/*> -<ui/*>

[env:esp32s3]
platform = espressif32@6.12.0
board = waveshare_s3_lcd7
framework = arduino

build_src_filter = +<*> -<main_test.cpp>

build_flags =
    ; Compiler: optimize for speed (not size)
    -O2
    ; Disable ESP-IDF logging at runtime (saves CPU cycles)
    -DCORE_DEBUG_LEVEL=0
    ; LVGL config
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DLV_MEM_CUSTOM=1
    -DLV_MEMCPY_MEMSET_STD=1
    -DLV_ATTRIBUTE_FAST_MEM=IRAM_ATTR
    ; LCD anti-flicker: restart DMA on vsync to prevent drift
    -DCONFIG_LCD_RGB_RESTART_IN_VSYNC=1
    ; I2C
    -DWIRE_BUFFER_SIZE=256
    ; Project
    -I include
    -I src/drivers
    -I src/ui

; --- Libraries ---
lib_deps =
    lvgl/lvgl@^8.4.0
    bblanchon/ArduinoJson@^7.4.0
    robtillaart/M5ROTATE8@^0.4.2
    dfrobot/DFRobot_VisualRotaryEncoder@^1.0.1

; --- Upload ---
upload_port = COM19
upload_speed = 460800
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Extra source dirs ---
lib_extra_dirs =
