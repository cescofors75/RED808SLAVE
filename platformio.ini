; =============================================================================
; Workspace wrapper configuration
; Builds the BlueSlaveV2 firmware from the workspace root so VS Code tasks,
; PlatformIO buttons and debug configs all target the same project.
; =============================================================================

[platformio]
default_envs = esp32s3
src_dir = BlueSlaveV2/src
include_dir = BlueSlaveV2/include
lib_dir = BlueSlaveV2/lib
test_dir = BlueSlaveV2/test
boards_dir = BlueSlaveV2/boards

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = waveshare_s3_lcd7
framework = arduino
monitor_speed = 115200
upload_port = COM21
monitor_port = COM21
upload_speed = 460800
monitor_filters = esp32_exception_decoder
build_src_filter = +<*> -<main_test.cpp>
lib_deps = 
	lvgl/lvgl@^8.4.0
	bblanchon/ArduinoJson@^7.4.0
	robtillaart/M5ROTATE8@^0.4.2
	dfrobot/DFRobot_VisualRotaryEncoder@^1.0.1
build_flags = 
	-O2
	-DCORE_DEBUG_LEVEL=0
	-DRED808_ENABLE_DEBUG_LOG=1
	-DLV_CONF_INCLUDE_SIMPLE
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-DLV_MEM_CUSTOM=1
	-DLV_MEMCPY_MEMSET_STD=1
	-DLV_ATTRIBUTE_FAST_MEM=IRAM_ATTR
	-I BlueSlaveV2/include
	-I BlueSlaveV2/src/drivers
	-I BlueSlaveV2/src/ui
	-Wno-unused-variable
	-Wno-unused-but-set-variable
 	-Wno-sign-compare
	-Wno-cpp
